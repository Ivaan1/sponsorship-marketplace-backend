name: CI

on:
  push:
    branches: [main, dev, "test/**"]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias (lockfile)
        run: npm ci

      - name: Ejecutar tests
        run: npm test
        env:
          NODE_ENV: test
          SECRET_JWT: ${{ secrets.SECRET_JWT }}